# Server — headless server environment with no hardware modules.
# Runs the Discord bot, ChatGPT, and Telegram integrations.

# ── Core ──────────────────────────────────────────────────────────────────────

messaging_service:
  enabled: true

logwrapper:
  enabled: true

# ── Connectivity ──────────────────────────────────────────────────────────────

chatgpt:
  enabled: true

telegram:
  enabled: true

discordbot:
  enabled: true
