# ── Sensors ───────────────────────────────────────────────────────────────────

bno055:
  enabled: true
  instances:
    - name: imu_head
      test_on_boot: false
      address: 0x28
    - name: imu_body
      test_on_boot: false
      line_offset: 1
      address: 0x29

pitemperature:
  enabled: true

# ── GPIO ──────────────────────────────────────────────────────────────────────

gpio_motion:
  enabled: true
  config:
    pin: 9
    test_on_boot: false

laser:
  enabled: true
  config:
    pin: 6
    test_on_boot: false

# ── Display ───────────────────────────────────────────────────────────────────

oled_display:
  enabled: true
  config:
    test_on_boot: false
    time_on_boot: false
    reset_pin: 26
    dc_pin: 24

tft_display:
  enabled: true
  config:
    bus: 0
    device: 0
    rst_pin: 27
    dc_pin: 25
    bl_pin: 18
    rotation: -90.0
    test_on_boot: true

# ── Audio ─────────────────────────────────────────────────────────────────────

ttsmodule:
  enabled: true

# ── Vision ────────────────────────────────────────────────────────────────────

vision_imx500:
  enabled: true
