# Archie — full biped robot with bus servos, IMU, vision, and all hardware modules.
# Device-specific hardware configuration (servo IDs, GPIO pins, I2C addresses) lives here.
# Generic module configuration (AI prompts, log levels, etc.) stays in each module's config.yml.

# ── Core ──────────────────────────────────────────────────────────────────────

messaging_service:
  enabled: true

logwrapper:
  enabled: true

personality:
  enabled: true

input_recorder:
  enabled: true

animate:
  enabled: true

# ── Connectivity ──────────────────────────────────────────────────────────────

chatgpt:
  enabled: true

telegram:
  enabled: true

controller_handler:
  enabled: true

xbox_controller:
  enabled: true

