controller:
  enabled: true
  path: 'modules.controller.Controller'
  config:
    debug: false
    device: '/dev/input/js0'  # Add this
    deadzone: 4000 # thumbsticks deadzone (seems to be needed for xbox controllers)
    button_names:  # Add this
      0: 'BTN_A'
      1: 'BTN_B'
      2: 'BTN_X'
      3: 'BTN_Y'
      4: 'BTN_TL'
      5: 'BTN_TR'
      6: 'BTN_SELECT'
      7: 'BTN_START'
      8: 'BTN_MODE'
      9: 'BTN_THUMBL'
      10: 'BTN_THUMBR'
      11: 'KEY_RECORD'  # Xbox Series controller
    axis_names:  # Add this
      0: 'ABS_X'
      1: 'ABS_Y'
      2: 'ABS_Z'
      3: 'ABS_RZ'
      4: 'ABS_RX'
      5: 'ABS_RY'
      6: 'ABS_HAT0X'
      7: 'ABS_HAT0Y'
    axis_max: 32767.0
    axis_min: -32767.0
    modifier_buttons:
      - BTN_TL
      - BTN_TR
    button_action_map:
      default:
        BTN_TL:
          - topic: ''
            args: {}
        BTN_TR:
          - topic: ''
            args: {}
        BTN_SELECT:
          - topic: 'record/stop'
            args: {}
        BTN_START:
          - topic: 'record/start'
            args: {}
        KEY_RECORD: # Only on Xbox S/X remotes
          - topic: ''
            args: {}
        BTN_MODE: # Xbox Logo
          - topic: ''
            args: {}
        ABS_HAT0X: # DPAD X
          - topic: ''
            args: {}
        ABS_HAT0Y: # DPAD Y
          - topic: ''
            args: {}
        BTN_A:
          - topic: 'tts'
            args: {
              msg: 'Test Default'
            }
        BTN_X:
          - topic: 'eye/blink'
            args: {}
        BTN_Y:
          - topic: 'gpio/laser/toggle'
            args: {}
        BTN_B:
          - topic: ''
            args: {}
        ABS_RX:
          - topic: 'servo:neck_pan:mv'
            args: {}
            modifier:
              scale: 0.1  # max speed per event
            max_delta: 200 # max position change per event
        ABS_RZ:
          - topic: 'servo:neck_tilt:mv'
            args: {}
            modifier:
              scale: -0.2
            max_delta: 200
        ABS_RY: # Right trigger
          - topic: 'eye/blink'
            args: {}
            start: -32767
        ABS_Z:  # Left trigger
          - topic: ''
            args: {}
            start: -32767
        ABS_X:
          - topic: 'eye/move'
            args: {axis: 'y'}
            modifier:
              scale: -1.0
            max_delta: 50
        ABS_Y:
          - topic: 'eye/move'
            args: {axis: 'x'}
            modifier:
              scale: -1.0
            max_delta: 50
      BTN_TL:
        BTN_X:
          - topic: 'servo:neck_pan:mv'
            args: {delta: 50}
        BTN_Y:
          - topic: 'servo:neck_tilt:mv'
            args: {delta: 50}
        BTN_B:
          - topic: 'servo:neck_pan:mv'
            args: {delta: -50}
        BTN_A:
          - topic: 'servo:neck_tilt:mv'
            args: {delta: -50}
      BTN_TR:
        BTN_A:
          - topic: 'tts'
            args: {
              msg: 'Left Shoulder Held'
            }
        ABS_X:
          - topic: 'servo:leg_l_ankle:mv'
            modifier:
              scale: 0.1
          - topic: 'servo:leg_r_ankle:mv'
            modifier:
              scale: -0.1
          - topic: 'servo:leg_l_knee:mv'
            modifier:
              scale: 0.1
          - topic: 'servo:leg_r_knee:mv'
            modifier:
              scale: -0.1
          - topic: 'servo:leg_l_hip:mv'
            modifier:
              scale: 0.1
          - topic: 'servo:leg_r_hip:mv'
            modifier:
              scale: -0.1
