bno055:
  enabled: true
  environment: robot
  path: modules.sensor.imu.bno055.BNO055
  instances:
    - name: "imu_head"
      test_on_boot: false
      bus: 1
      address: 0x28
    - name: "imu_body"
      test_on_boot: false
      bus: 1
      line_offset: 1
      address: 0x29
  dependencies:
    python:
      - adafruit-circuitpython-bno055
      - adafruit-blinka
