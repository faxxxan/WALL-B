# Cody — biped robot with I2C servos (PCA9685) and minimal sensor suite.
# Device-specific hardware configuration (servo pins, GPIO pins) lives here.
# Generic module configuration stays in each module's config.yml.

# ── Core ──────────────────────────────────────────────────────────────────────

messaging_service:
  enabled: true

logwrapper:
  enabled: true

personality:
  enabled: true
  inject:
    servos: "Servo_*"

input_recorder:
  enabled: true

animate:
  enabled: true

# ── Connectivity ──────────────────────────────────────────────────────────────

chatgpt:
  enabled: true

telegram:
  enabled: true

controller_handler:
  enabled: true
  inject:
    controller: XboxController
  on_inject:
    - start

xbox_controller:
  enabled: true

# ── Servos ────────────────────────────────────────────────────────────────────

# Cody uses I2C servos via PCA9685
i2c_servo:
  enabled: true

# ── Sensors ───────────────────────────────────────────────────────────────────

pitemperature:
  enabled: true

# ── GPIO ──────────────────────────────────────────────────────────────────────

gpio_motion:
  enabled: true
  config:
    pin: 9
    test_on_boot: false

laser:
  enabled: true
  config:
    pin: 6
    test_on_boot: false

# ── Display ───────────────────────────────────────────────────────────────────

oled_display:
  enabled: true
  config:
    test_on_boot: false
    time_on_boot: false
    reset_pin: 26
    dc_pin: 24

# ── Audio ─────────────────────────────────────────────────────────────────────

ttsmodule:
  enabled: true
