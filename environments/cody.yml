# Cody — biped robot with I2C servos (PCA9685), IMU, vision, and TFT display.
# Based on the develop branch robot-environment configuration.
# Device-specific hardware configuration (servo pins, GPIO pins, I2C addresses) lives here.
# Generic module configuration stays in each module's config.yml.

# ── Core ──────────────────────────────────────────────────────────────────────

messaging_service:
  enabled: true

logwrapper:
  enabled: true

personality:
  enabled: true
  inject:
    servos: "Servo_*"
    imu.head: BNO055_imu_head
    imu.body: BNO055_imu_body
    vision: Vision

input_recorder:
  enabled: true
    imu.head: BNO055_imu_head
    imu.body: BNO055_imu_body
    vision: Vision

animate:
  enabled: true

# ── Connectivity ──────────────────────────────────────────────────────────────

chatgpt:
  enabled: true

telegram:
  enabled: true

controller_handler:
  enabled: true
  inject:
    controller: XboxController
  on_inject:
    - start

xbox_controller:
  enabled: true

# ── Servos ────────────────────────────────────────────────────────────────────

# Cody uses I2C servos via PCA9685
i2c_servo:
  enabled: true

# ── Sensors ───────────────────────────────────────────────────────────────────

bno055:
  enabled: true
  instances:
    - name: imu_head
      test_on_boot: false
      address: 0x28
    - name: imu_body
      test_on_boot: false
      line_offset: 1
      address: 0x29

pitemperature:
  enabled: true

# ── Display ───────────────────────────────────────────────────────────────────

tft_display:
  enabled: true
  config:
    bus: 0
    device: 0
    rst_pin: 27
    dc_pin: 25
    bl_pin: 18
    rotation: -90.0
    test_on_boot: true

# ── Audio ─────────────────────────────────────────────────────────────────────

ttsmodule:
  enabled: true
  config:
    service: "elevenlabs"
    voice_id: "pMsXgVXv3BLzUgSXRplE"

# ── Vision ────────────────────────────────────────────────────────────────────

vision_imx500:
  enabled: true
  config:
    preview: false

tracking:
  enabled: false
